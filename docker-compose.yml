services:
  db:
    image: postgres:16-alpine
    container_name: aviary-test-db
    environment:
      POSTGRES_USER: aviary
      POSTGRES_PASSWORD: aviary
      POSTGRES_DB: aviary
    volumes:
      - aviary-pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aviary -d aviary"]
      interval: 2s
      timeout: 3s
      retries: 20

  api:

    container_name: aviary-test-api
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3000"
      FIXTURE_DIR: /fixtures/public
      DATABASE_URL: postgres://aviary:aviary@db:5432/aviary
      NODE_ENV: production
    volumes:
      - ./assignment/fixtures:/fixtures:ro
    ports:
      - "3000:3000"
      - "9464:9464"

volumes:
  aviary-pg-data:
